services:
  db:
    image: postgres:17-alpine
    container_name: it_inventory_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-it_inventory}
      POSTGRES_USER: ${POSTGRES_USER:-it_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-it_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    container_name: it_inventory_backend
    restart: unless-stopped
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    env_file:
      - .env
    depends_on:
      - db

volumes:
  postgres_data: