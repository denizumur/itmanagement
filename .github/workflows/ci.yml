name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  backend:
    name: Backend checks
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: it_inventory_ci
          POSTGRES_USER: it_inventory_ci
          POSTGRES_PASSWORD: it_inventory_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U it_inventory_ci -d it_inventory_ci"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    defaults:
      run:
        working-directory: backend

    env:
      DJANGO_SECRET_KEY: ci-django-secret-key-at-least-32-bytes-long-123456789
      JWT_SIGNING_KEY: ci-jwt-signing-key-at-least-32-bytes-long-123456789
      DEBUG: "False"

      POSTGRES_DB: it_inventory_ci
      POSTGRES_USER: it_inventory_ci
      POSTGRES_PASSWORD: it_inventory_ci
      POSTGRES_HOST: localhost
      POSTGRES_PORT: "5432"

      ALLOWED_HOSTS: localhost,127.0.0.1
      CORS_ALLOWED_ORIGINS: http://localhost:5173
      CSRF_TRUSTED_ORIGINS: http://localhost:5173
      AUTH_COOKIE_REQUIRE_ORIGIN: "false"
      AUTH_COOKIE_ALLOWED_ORIGINS: http://localhost:5173

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check Django project
        run: python manage.py check

      - name: Check migrations are committed
        run: python manage.py makemigrations --check --dry-run

      - name: Apply migrations
        run: python manage.py migrate --noinput
        
    - name: Run backend tests
      shell: bash
      run: |
      set -o pipefail
      python manage.py test --verbosity 2 2>&1 | tee test-output.log
      
      if grep -q "Found 0 test" test-output.log || grep -q "Ran 0 tests" test-output.log || grep -q "NO TESTS RAN" test-output.log; then
       echo "::error::Django test runner did not discover any tests. CI cannot pass with 0 tests."
       exit 1
    fi 

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Build frontend
        run: npm run build